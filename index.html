<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroFlow OS 2.0</title>
    <meta name="description" content="Centro de mando para gestión neurodivergente inteligente" />
    <meta name="theme-color" content="#9b8ec4" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
  </head>
  <body>
    <div id="loading-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fdfbff; z-index: 9999; font-family: sans-serif; color: #7a7089;">
      <div style="text-align: center;">
        <p style="font-size: 1.2rem; margin-bottom: 10px;">NeuroFlow OS 2.5</p>
        <p style="font-size: 0.8rem; color: #9b8ec4;">Cargando sistema actualizado...</p>
      </div>
    </div>
    <script>
      // Fail-safe: Si después de 5 segundos sigue el overlay, mostrar un mensaje de ayuda
      setTimeout(function() {
        var overlay = document.getElementById('loading-overlay');
        if (overlay && overlay.style.opacity !== '0') {
          var details = overlay.querySelector('div');
          if (details) {
            details.innerHTML += '<p style="font-size: 0.7rem; color: #ef4444; margin-top: 20px;">' +
              'Si la aplicación no carga, asegúrate de estar usando un navegador moderno.<br>' +
              'Intenta abrir el archivo con Chrome o Edge.</p>';
          }
        }
      }, 5000);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Forzar la remoción del overlay cuando React cargue
      window.addEventListener('load', function() {
        // Un pequeño retraso para asegurar que React haya montado el root
        setTimeout(function() {
          var overlay = document.getElementById('loading-overlay');
          if (overlay) {
            overlay.style.transition = 'opacity 0.5s ease';
            overlay.style.opacity = '0';
            setTimeout(function() { overlay.remove(); }, 500);
          }
        }, 300);
      });
    </script>
  </body>
</html>
